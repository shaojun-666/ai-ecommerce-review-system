x-app-defaults: &app-defaults
  restart: unless-stopped
  networks:
    - app-network

services:
  postgres:
    <<: *app-defaults
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    environment:
      POSTGRES_DB: ecommerce_reviews
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce_reviews"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *app-defaults
    image: redis:7-alpine
    container_name: ecommerce-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    <<: *app-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - model-data:/app/nlp/models
    environment:
      - DATABASE_URL=postgresql://ecommerce:ecommerce_password@postgres:5432/ecommerce_reviews
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FLASK_ENV=development
      - FLASK_APP=wsgi.py
      - NLP_MODEL_PATH=/app/nlp/models
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    <<: *app-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-celery
    volumes:
      - ./backend:/app
      - model-data:/app/nlp/models
    environment:
      - DATABASE_URL=postgresql://ecommerce:ecommerce_password@postgres:5432/ecommerce_reviews
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FLASK_APP=wsgi.py
      - NLP_MODEL_PATH=/app/nlp/models
      - SKIP_MIGRATIONS=true
    env_file:
      - .env
    command: celery -A app.tasks worker -l info -c 4 --max-tasks-per-child=100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    <<: *app-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-celery-beat
    volumes:
      - ./backend:/app
      - model-data:/app/nlp/models
    environment:
      - DATABASE_URL=postgresql://ecommerce:ecommerce_password@postgres:5432/ecommerce_reviews
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FLASK_APP=wsgi.py
      - SKIP_MIGRATIONS=true
    env_file:
      - .env
    command: celery -A app.tasks beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    <<: *app-defaults
    image: nginx:1.25-alpine
    container_name: ecommerce-nginx
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      # Production SSL: mount certs to /etc/ssl/certs/ and /etc/ssl/private/
      # - ./ssl/certs:/etc/ssl/certs:ro
      # - ./ssl/private:/etc/ssl/private:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  model-data:
