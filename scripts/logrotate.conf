# Logrotate config for AI Ecommerce System (host-based deployments)
# Place in /etc/logrotate.d/ecommerce on Linux hosts

/var/log/nginx/ecommerce_*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 `cat /var/run/nginx.pid`
    endscript
}

/var/log/ecommerce/backend.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
}
